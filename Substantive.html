<title>Deutsche Substantive – German Nouns Reference</title>

<style>
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: #232327ee; backdrop-filter: blur(12px);
  border-bottom: 1px solid #3e3e44;
  padding: 14px 16px 10px;
}
.top-bar h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; font-weight: 700;
  color: #f0f0f4; letter-spacing: -0.5px;
  text-align: center; margin-bottom: 10px;
}
.top-bar .sub {
  text-align: center; font-size: 15px; color: #ababba;
  margin: -6px 0 8px;
}
.controls {
  max-width: 900px; margin: 0 auto;
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center; justify-content: center;
}
.search-box {
  flex: 1 1 240px; max-width: 320px;
  padding: 7px 12px;
  border: 2px solid #58585e; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: #6366f1; }
.search-box::placeholder { color: #ababba; }
.filter-btn {
  padding: 5px 12px;
  border: 2px solid #58585e; border-radius: 7px;
  background: #343438;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; color: #8888a0;
}
.filter-btn:hover { border-color: #ababba; }
.filter-btn.active-der { background: #1e3a5f; border-color: #60a5fa; color: #8ec4ff; }
.filter-btn.active-die { background: #5a1e3a; border-color: #f472b6; color: #ffa0c8; }
.filter-btn.active-das { background: #4a3a10; border-color: #9a7a20; color: #f0d060; }
.filter-btn.active-all { background: #3a3a42; border-color: #ababba; color: #e0e0e4; }
.cat-btn {
  padding: 4px 8px;
  border: 1.5px solid #e2e8f0; border-radius: 5px;
  background: #343438;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; color: #ababba;
}
.cat-btn:hover { border-color: #ababba; color: #8888a0; }
.cat-btn.active-cat { background: #2a2a50; border-color: #7a80f0; color: #a0a8ff; }
.stats {
  width: 100%; text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; color: #ababba; margin-top: 4px;
}
.container { max-width: 940px; margin: 0 auto; padding: 14px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 6px;
}
.card {
  position: relative; border-radius: 9px;
  padding: 10px 13px; border: 2px solid;
  cursor: default; transition: transform 0.12s, box-shadow 0.12s;
}
.card:hover { transform: translateY(-2px); z-index: 5; }
.card.g-der { background: #1e3050; border-color: #3a6ea8; }
.card.g-der:hover { box-shadow: 0 4px 12px #bfdbfe88; }
.card.g-die { background: #4a1e35; border-color: #a84070; }
.card.g-die:hover { box-shadow: 0 4px 12px #fbcfe888; }
.card.g-das { background: #3a3510; border-color: #9a7a20; }
.card.g-das:hover { box-shadow: 0 4px 12px #fde68a88; }
.card-top {
  display: flex; justify-content: space-between;
  align-items: baseline; margin-bottom: 2px;
}
.article {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
}
.g-der .article { color: #3b82f6; }
.g-die .article { color: #ec4899; }
.g-das .article { color: #d97706; }
.word {
  font-family: 'Inter', Arial, Helvetica, sans-serif;
  font-size: 20px; font-weight: 700; color: #f0f0f4;
}
.plural {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: #8888a0;
}
.meaning {
  font-size: 14px; color: #c0c0c8;
  margin-top: 2px; line-height: 1.3;
}
.cat-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: #ababba;
  background: #2a2a38; padding: 1px 5px;
  border-radius: 3px; margin-top: 3px;
  text-transform: uppercase; letter-spacing: 0.5px;
}



.empty-state {
  text-align: center; padding: 60px 20px;
  color: #ababba; font-size: 14px;
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .top-bar { padding: 8px 10px 6px; }
  .top-bar h1 { font-size: 18px; margin-bottom: 6px; }
  .top-bar .sub { display: none; }
  .controls { gap: 4px; }
  .search-box { font-size: 13px; padding: 6px 10px; }
  .filter-btn { padding: 4px 8px; font-size: 11px; }
  .cat-btn { padding: 3px 6px; font-size: 10px; }
  .stats { font-size: 11px; margin-top: 2px; }
  .tooltip { white-space: normal; min-width: 240px; font-size: 12px; }
}
/* ─── Guess Mode ─── */
.filter-btn.guess-active{background:#2a1848;border-color:#7a60c0;color:#c8a8ff}
</style>
</head>
<body>
<div class="top-bar">
  <h1>Deutsche Substantive</h1>
  <p class="sub">hover for example phrase · search German or English · filter by gender or category</p>
  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="Suchen..." autofocus>
    <button class="filter-btn" id="guess-btn" onclick="toggleGuess()">🎯 Raten</button>
    <button class="filter-btn" id="shuffle-btn" onclick="toggleShuffle()">🔀 Mischen</button>
    <button class="filter-btn active-all" data-gender="all" onclick="setGender(this)">All</button>
    <button class="filter-btn" data-gender="der" onclick="setGender(this)">der</button>
    <button class="filter-btn" data-gender="die" onclick="setGender(this)">die</button>
    <button class="filter-btn" data-gender="das" onclick="setGender(this)">das</button>
  </div>
  <div class="controls" style="margin-top:5px;" id="cat-bar"></div>
  <div class="stats" id="stats"></div>
</div>
<div class="container">
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none;">Keine Treffer.</div>
</div>

const CATS =[...new Set(DATA.map(d => d[4]))].sort();

let ch = '<button class="cat-btn active-cat" data-cat="all" onclick="setCat(this)">all</button>';
CATS.forEach(c => { ch += `<button class="cat-btn" data-cat="${c}" onclick="setCat(this)">${c}</button>`; });

function setGender(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  currentGender = btn.dataset.gender;
  btn.classList.add(currentGender === 'all' ? 'active-all' : 'active-' + currentGender);
  render();
}
function setCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
  currentCat = btn.dataset.cat;
  btn.classList.add('active-cat');
  render();
}
document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase().trim();
  render();
});
let guessMode = false;
let shuffleMode = false;
function toggleShuffle() {
  shuffleMode = !shuffleMode;
  document.getElementById('shuffle-btn').classList.toggle('guess-active', shuffleMode);
  render();
}
function toggleGuess() {
  guessMode = !guessMode;
  document.getElementById('guess-btn').classList.toggle('guess-active', guessMode);
  render();
}
document.getElementById('grid').addEventListener('click', function(e) {
  const card = e.target.closest('.guess-hidden, .guess-revealed');
  if (!card || !guessMode) return;
  if (card.classList.contains('guess-hidden')) {
    card.classList.remove('guess-hidden'); card.classList.add('guess-revealed');
  } else {
    card.classList.remove('guess-revealed'); card.classList.add('guess-hidden');
  }
});

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  let f = DATA;
  if (currentGender !== 'all') f = f.filter(d => d[1] === currentGender);
  if (currentCat !== 'all') f = f.filter(d => d[4] === currentCat);
  if (searchTerm) f = f.filter(d => d[0].toLowerCase().includes(searchTerm) || d[3].toLowerCase().includes(searchTerm));
  if (shuffleMode) f = shuffleArray(f);
  if (!f.length) { grid.innerHTML = ''; empty.style.display = 'block'; stats.textContent = '0'; return; }
  empty.style.display = 'none';
  stats.textContent = f.length + ' nouns';
  let h = '';
  f.forEach(d => {
    const [word, gender, plural, meaning, cat, phrase] = d;
    const gc = 'g-' + gender.replace(/\//g,'');
    const pt = plural === '(pl.)' || plural === '(no pl.)' ? plural : plural.startsWith('-') ? 'Pl: ' + word + plural.replace(/^-/, '') : 'Pl: ' + plural;
    const tt = phrase ? `<div class="tooltip">${phrase}</div>` : '';
    const pluralText = plural === '(no pl.)' ? '—' : (plural === '(pl.)' ? 'pl. only' : pt);
    if (guessMode) {
      const ttG = tt ? tt.replace('class="tooltip"', 'class="tooltip guess-hide"') : '';
      h += `<div class="card ${gc} guess-hidden">${ttG}<div class="card-top"><span class="article guess-hide">${gender}</span><span class="plural guess-hide">${pluralText}</span></div><div class="word">${word}</div><div class="meaning guess-hide">${meaning}</div><span class="cat-tag guess-hide">${cat}</span></div>`;
    } else {
      h += `<div class="card ${gc}">${tt}<div class="card-top"><span class="article">${gender}</span><span class="plural">${pluralText}</span></div><div class="word">${word}</div><div class="meaning">${meaning}</div><span class="cat-tag">${cat}</span></div>`;
    }
  });
  grid.innerHTML = h;
}
render();
</script>
</body>
</html>
