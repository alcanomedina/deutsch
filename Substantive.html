const CATS = [...new Set(DATA.map(d => d[4]))].sort();
let currentGender = 'all', currentCat = 'all', searchTerm = '';

const catBar = document.getElementById('cat-bar');
let ch = '<button class="cat-btn active-cat" data-cat="all" onclick="setCat(this)">all</button>';
CATS.forEach(c => { ch += `<button class="cat-btn" data-cat="${c}" onclick="setCat(this)">${c}</button>`; });
catBar.innerHTML = ch;

function setGender(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  currentGender = btn.dataset.gender;
  btn.classList.add(currentGender === 'all' ? 'active-all' : 'active-' + currentGender);
  render();
}
function setCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
  currentCat = btn.dataset.cat;
  btn.classList.add('active-cat');
  render();
}
document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase().trim();
  render();
});
function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  let f = DATA;
  if (currentGender !== 'all') f = f.filter(d => d[1] === currentGender);
  if (currentCat !== 'all') f = f.filter(d => d[4] === currentCat);
  if (searchTerm) f = f.filter(d => d[0].toLowerCase().includes(searchTerm) || d[3].toLowerCase().includes(searchTerm));
  if (!f.length) { grid.innerHTML = ''; empty.style.display = 'block'; stats.textContent = '0'; return; }
  empty.style.display = 'none';
  stats.textContent = f.length + ' nouns';
  let h = '';
  f.forEach(d => {
    const [word, gender, plural, meaning, cat, phrase] = d;
    const gc = 'g-' + gender.replace(/\//g,'');
    const pt = plural === '(pl.)' || plural === '(no pl.)' ? plural : 'Pl: ' + word + plural.replace(/^\s*-/,'');
    const tt = phrase ? `<div class="tooltip">${phrase}</div>` : '';
    h += `<div class="card ${gc}">${tt}<div class="card-top"><span class="article">${gender}</span><span class="plural">${plural === '(no pl.)' ? '—' : (plural === '(pl.)' ? 'pl. only' : pt)}</span></div><div class="word">${word}</div><div class="meaning">${meaning}</div><span class="cat-tag">${cat}</span></div>`;
  });
  grid.innerHTML = h;
}
render();
</script>
